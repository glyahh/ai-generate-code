spring:
  application:
    name: glyahh-ai-generate-code-backend
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gly_ai_generate_code
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}

  #Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      # 超过一小时自动删除存储的键值对
      ttl: 3600

  profiles:
    active: local

  session:
    store-type: redis
    timeout: 2592000 # 30天过期






server:
  port: 8124
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000



langchain4j:
  open-ai:
    chat-model:
      # 使用的模型名称，例如 qwen3.5-plus
      model-name: ${langchain4j.open-ai.chat-model.model-name}
      # Qwen3.5-Plus 的兼容模式地址，以阿里云百炼为例
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      # 你的 Qwen API Key
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      # 开启详细的请求和回答日志记录
      log-requests: true
      log-responses: true
      max-tokens: 8192
      # 最大重试次数
      max-retries: 2
      # 结构化输出
      strict-json-schema: true
      response-format: json_object

    Streaming-chat-model:       # 使用的模型名称，例如 qwen3.5-plus
      model-name: ${langchain4j.open-ai.chat-model.model-name}
      # Qwen3.5-Plus 的兼容模式地址，以阿里云百炼为例
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      # 你的 Qwen API Key
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      # 开启详细的请求和回答日志记录
      log-requests: true
      log-responses: true
      max-tokens: 8192
      # 最大重试次数
      max-retries: 2




