spring:
  application:
    name: glyahh-ai-generate-code-backend
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gly_ai_generate_code
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}

  #Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      # 超过一小时自动删除存储的键值对
      ttl: 3600

  # 使用local的yml
  profiles:
    active: local

  # 用于存储ai和用户的聊天记忆
  session:
    store-type: redis
    timeout: 2592000 # 30天过期


server:
  port: 8124
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000


langchain4j:
  open-ai:
    # 最普通的模型
    chat-model:
      # 1. 对话记忆压缩/总结
      # 2. 工作流图片相关
      # 3. 代码生成主链路里的「非流式 / 工具侧」模型(几乎不用)
      model-name: ${langchain4j.open-ai.chat-model.model-name}
      # Qwen3.5-Plus 的兼容模式地址，以阿里云百炼为例
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      # 你的 Qwen API Key
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      # 开启详细的请求和回答日志记录
      log-requests: true
      log-responses: true
      max-tokens: 8192
      # 最大重试次数
      max-retries: 2
      output-guardrails-config:
        max-retries: 2
      # 结构化输出
#      strict-json-schema: true
#      response-format: json_object


    # 1. 单页 HTML、多文件（HTML / MULTI_FILE）的流式生成
    streaming-chat-model:
      model-name: glm-5 # qwen3.6-plus
      # Qwen3.5-Plus 的兼容模式地址，以阿里云百炼为例
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      # 你的 Qwen API Key
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      # 开启详细的请求和回答日志记录
      log-requests: true
      log-responses: true
      # 单页 HTML / 多文件流式输出易触顶 LENGTH；酌情调高（需与模型服务商上限一致）
      max-tokens: 12288
      # 最大重试次数
      max-retries: 2


    # 1. Vue 工程（VUE）的流式生成
    reasoning-streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: kimi-k2.6
      max-tokens: 32768
      temperature: 0.1 # 让AI 回答越稳定、保守、重复、确定性高
      log-requests: true
      log-responses: true

    # 1. 轻量「分类/路由」——决定代码生成类型枚举 CodeGenTypeEnum
    routing-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: qwen3.6-flash-2026-04-16
      log-requests: true
      log-responses: true

    # 1. 工作流里的「代码质检」
    code-exam-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: qwen3.5-flash
      max-tokens: 768
      temperature: 0.1
      log-requests: true
      log-responses: true




# 阿里云 DashScope 配置
dashscope:
  api-key: ${langchain4j.open-ai.chat-model.api-key}
  image-model: ${dashscope.image-model}


logging:
  level:
    dev.langchain4j.model.openai: info
    dev.langchain4j.model.TokenCounter: info


pexels:
  api-key: ${pexels.api-key}


# 添加 COS 对象存储配置
aliyun:
  oss:
    endpoint: ${aliyun.oss.endpoint}
    accessKeyId: ${aliyun.oss.accessKeyId}
    accessKeySecret: ${aliyun.oss.accessKeySecret}
    bucketName: ${aliyun.oss.bucketName}
    region: ${aliyun.oss.region}




# springdoc-openapi 配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.dbts.glyahhaigeneratecode.controller
# knife4j 配置项
knife4j:
  enable: true
  setting:
    language: zh_cn
