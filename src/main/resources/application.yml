spring:
  application:
    name: glyahh-ai-generate-code-backend
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gly_ai_generate_code
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}

  #Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      # 超过一小时自动删除存储的键值对
      ttl: 3600

  # 使用local的yml
  profiles:
    active: local

  # 用于存储ai和用户的聊天记忆
  session:
    store-type: redis
    timeout: 2592000 # 30天过期


server:
  port: 8124
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000


langchain4j:
  open-ai:
    # 最普通的模型
    chat-model:
      # 使用的模型名称，例如 qwen3.5-plus
      model-name: ${langchain4j.open-ai.chat-model.model-name}
      # Qwen3.5-Plus 的兼容模式地址，以阿里云百炼为例
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      # 你的 Qwen API Key
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      # 开启详细的请求和回答日志记录
      log-requests: true
      log-responses: true
      max-tokens: 8192
      # 最大重试次数
      max-retries: 2
      output-guardrails-config:
        max-retries: 2
      # 结构化输出
#      strict-json-schema: true
#      response-format: json_object

    # 普通流式输出模型
    streaming-chat-model:       # 使用的模型名称，例如 qwen3.5-plus
      model-name: qwen3-coder-next
      # Qwen3.5-Plus 的兼容模式地址，以阿里云百炼为例
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      # 你的 Qwen API Key
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      # 开启详细的请求和回答日志记录
      log-requests: true
      log-responses: true
      max-tokens: 8192
      # 最大重试次数
      max-retries: 2


    # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: kimi-k2.6
      max-tokens: 32768
      temperature: 0.1 # 让AI 回答越稳定、保守、重复、确定性高
      log-requests: true
      log-responses: true

    # 智能路由 AI 模型配置（用于简单的分类任务）
    routing-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: qwen3.6-flash-2026-04-16
      log-requests: true
      log-responses: true

    # 工作流代码质检（结构化 JSON、短输出；与主 chat-model 分离以降低延迟与费用）
    code-exam-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: qwen3.5-flash
      max-tokens: 2048
      temperature: 0.1
      log-requests: true
      log-responses: true




# 阿里云 DashScope 配置
dashscope:
  api-key: ${langchain4j.open-ai.chat-model.api-key}
  image-model: ${dashscope.image-model}


logging:
  level:
    dev.langchain4j.model.openai: info
    dev.langchain4j.model.TokenCounter: info


pexels:
  api-key: ${pexels.api-key}


# 添加 COS 对象存储配置
aliyun:
  oss:
    endpoint: ${aliyun.oss.endpoint}
    accessKeyId: ${aliyun.oss.accessKeyId}
    accessKeySecret: ${aliyun.oss.accessKeySecret}
    bucketName: ${aliyun.oss.bucketName}
    region: ${aliyun.oss.region}




# springdoc-openapi????
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.dbts.glyahhaigeneratecode.controller
# knife4j?????
knife4j:
  enable: true
  setting:
    language: zh_cn