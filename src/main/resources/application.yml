spring:
  application:
    name: glyahh-ai-generate-code-backend
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gly_ai_generate_code
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}

  #Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      # 超过一小时自动删除存储的键值对
      ttl: 3600

  # 使用local的yml
  profiles:
    active: local

  # 用于存储ai和用户的聊天记忆
  session:
    store-type: redis
    timeout: 2592000 # 30天过期

# ---------------------------------------------------------------------------
# 会话记忆（V4）：MySQL 为真相源，以下为 Redis 热缓存 TTL + 治理与 manifest 重试
# 绑定前缀见 ConversationMemoryProperties：conversation.memory.*
# ---------------------------------------------------------------------------
conversation:
  memory:
    # Redis key：cm:state:{appId}。缓存 conversation_memory_state 摘要/索引等，过期后从 DB 回填。
    # 默认 14 天（秒）
    state-ttl-seconds: 1209600
    # Redis key：cm:ref:{refId}。超长归档片段热缓存，过期后从 conversation_memory_ref 表回源。
    # 默认 3 天（秒）
    ref-ttl-seconds: 259200
    # --- G 数据治理：定时任务清理 conversation_memory_ref，多条件任一超限则删最旧 ---
    # 单 app 最多保留 ref 行数（超出删旧）
    ref-keep-count-per-app: 500
    # 单 app ref 超过该创建天数的记录删除
    ref-keep-days-per-app: 30
    # 单 app ref 内容总字节上限（约 200MB，超出按滚动字节删旧）
    ref-keep-bytes-per-app: 209715200
    # onRoundCompleted 扫盘前：目录文件数/mtime 连续一致才认为落盘稳定；最大轮询次数
    manifest-stable-retry-times: 3
    # 每轮稳定性检查间隔（毫秒），与 retry-times 配合约覆盖「短暂落盘延迟」
    manifest-stable-retry-sleep-ms: 150
    # --- 方式 2：工具写盘后 fileNote（批量 LLM 摘要，见 ConversationMemoryFileNoteService）---
    file-note-enabled: true
    file-note-debounce-ms: 400
    file-note-max-paths-per-round: 20
    file-note-input-chars: 2000
    file-note-max-note-chars: 120


server:
  port: 8124
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000


langchain4j:
  open-ai:
    # 最普通的模型
    chat-model:
      # 1. 对话记忆压缩/总结
      # 2. 工作流图片相关
      # 3. 代码生成主链路里的「非流式 / 工具侧」模型(几乎不用)
      model-name: ${langchain4j.open-ai.chat-model.model-name}
      # Qwen3.5-Plus 的兼容模式地址，以阿里云百炼为例
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      # 你的 Qwen API Key
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      # 开启详细的请求和回答日志记录
      log-requests: true
      log-responses: true
      max-tokens: 8192
      # 最大重试次数
      max-retries: 2
      output-guardrails-config:
        max-retries: 2
      # 结构化输出
#      strict-json-schema: true
#      response-format: json_object


    # 1. 单页 HTML、多文件（HTML / MULTI_FILE）的流式生成
    streaming-chat-model:
      model-name: qwen3.6-flash-2026-04-16 # qwen3.6-plus
      # Qwen3.5-Plus 的兼容模式地址，以阿里云百炼为例
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      # 你的 Qwen API Key
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      # 开启详细的请求和回答日志记录
      log-requests: true
      log-responses: true
      # 单页 HTML / 多文件流式输出易触顶 LENGTH；酌情调高（需与模型服务商上限一致）
      max-tokens: 12288
      # 最大重试次数
      max-retries: 2


    # 1. Vue 工程（VUE）的流式生成
    reasoning-streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: glm-5.1
      max-tokens: 32768
      temperature: 0.1 # 让AI 回答越稳定、保守、重复、确定性高
      log-requests: true
      log-responses: true

    # 1. 轻量「分类/路由」——决定代码生成类型枚举 CodeGenTypeEnum
    routing-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: qwen3.6-flash-2026-04-16
      log-requests: true
      log-responses: true

    # 1. 工作流里的「代码质检」
    code-exam-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: qwen3.6-plus-2026-04-02
      max-tokens: 768
      temperature: 0.1
      log-requests: true
      log-responses: true

    # 工具 writeFile/modifyFile 落盘后的路径级中文 fileNote（批量摘要）
    file-note-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: gui-plus-2026-02-26
      max-tokens: 2048
      temperature: 0.2
      log-requests: false
      log-responses: false




# 阿里云 DashScope 配置
dashscope:
  api-key: ${langchain4j.open-ai.chat-model.api-key}
  image-model: ${dashscope.image-model}


logging:
  level:
    dev.langchain4j.model.openai: info
    dev.langchain4j.model.TokenCounter: info


pexels:
  api-key: ${pexels.api-key}


# 添加 COS 对象存储配置
aliyun:
  oss:
    endpoint: ${aliyun.oss.endpoint}
    accessKeyId: ${aliyun.oss.accessKeyId}
    accessKeySecret: ${aliyun.oss.accessKeySecret}
    bucketName: ${aliyun.oss.bucketName}
    region: ${aliyun.oss.region}




# springdoc-openapi 配置
springdoc:
  group-configs:
  - group: 'default'
    paths-to-match: '/**'
    packages-to-scan: com.dbts.glyahhaigeneratecode.controller
# knife4j 配置项
knife4j:
  enable: true
  setting:
    language: zh_cn
